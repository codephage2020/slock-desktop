<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>slock-desktop</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #f7f7f5;
      }

      html {
        color-scheme: light dark;
      }

      @media (prefers-color-scheme: dark) {
        html,
        body,
        #root {
          background: #1f1f1c;
        }
      }

      body {
        cursor: default;
        color: light-dark(#1f1f1c, #f4f4ef);
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-content: center;
        gap: 14px;
        text-align: center;
      }

      .boot-mark {
        width: 44px;
        height: 42px;
        margin: 0 auto;
        color: #10a37f;
      }

      .boot-spinner {
        width: 22px;
        height: 22px;
        margin: 0 auto;
        border: 2px solid rgba(16, 163, 127, 0.22);
        border-top-color: #10a37f;
        border-radius: 999px;
        animation: boot-spin 900ms linear infinite;
      }

      .boot-title,
      .boot-detail {
        margin: 0;
      }

      .boot-title {
        color: light-dark(#6b6f67, #b7bbae);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .boot-detail {
        color: light-dark(#1f1f1c, #f4f4ef);
        font-size: 0.86rem;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-shell" aria-live="polite">
        <svg
          class="boot-mark"
          width="26"
          height="25"
          viewBox="0 0 48 46"
          fill="none"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"
          />
        </svg>
        <div class="boot-spinner" aria-hidden="true"></div>
        <p class="boot-title">slock-desktop</p>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
